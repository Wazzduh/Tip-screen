<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tip Screen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f4;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #007BFF;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<div class="container" id="main">
  <h2>Leave a Tip</h2>
  <p>Select an amount:</p>
  <button onclick="thankYou()">$2</button>
  <button onclick="thankYou()">$5</button>
  <button onclick="thankYou()">$10</button>
  <button onclick="thankYou()">No Tip</button>
</div>

<script>
  function thankYou() {
    document.getElementById("main").innerHTML = "<h2>Thank you!</h2>";
  }
</script>

</body>
</html>
