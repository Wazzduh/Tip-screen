<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Tip App</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-press: #16a34a;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: 80vh;
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1rem;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 20px;
      padding: 22px 16px;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(180deg, var(--accent), #15803d);
      box-shadow: 0 10px 20px rgba(34,197,94,0.25);
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    button:active {
      transform: scale(0.98);
      background: var(--accent-press);
    }

    .secondary {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(180deg, #374151, #1f2937);
      box-shadow: none;
      font-size: 1rem;
      padding: 14px 16px;
    }

    .hidden { display: none; }

    .thanks h2 {
      font-size: 2.2rem;
      margin: 0 0 12px;
    }

    .thanks p {
      font-size: 1.1rem;
      margin-bottom: 22px;
    }

    .badge {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(34,197,94,0.15);
      color: #86efac;
      font-size: 0.9rem;
      border: 1px solid rgba(34,197,94,0.25);
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div id="tip-screen">
      <div class="badge">Tap to leave a tip</div>
      <h1>Choose a Tip</h1>
      <p>Select an amount below.</p>

      <div class="button-grid">
        <button onclick="showThanks('$2')">$2</button>
        <button onclick="showThanks('$5')">$5</button>
        <button onclick="showThanks('$10')">$10</button>
        <button onclick="showThanks('$20')">$20</button>
      </div>

      <button id="installBtn" class="secondary hidden">Install App</button>
    </div>

    <div id="thank-you-screen" class="thanks hidden">
      <div class="badge" id="tipBadge">Tip selected</div>
      <h2>Thank you!</h2>
      <p>We appreciate your support.</p>
      <button class="secondary" onclick="goBack()">Back</button>
    </div>
  </main>

  <script>
    let deferredPrompt = null;

    function showThanks(amount) {
      document.getElementById('tip-screen').classList.add('hidden');
      document.getElementById('thank-you-screen').classList.remove('hidden');
      document.getElementById('tipBadge').textContent = amount + ' selected';
    }

    function goBack() {
      document.getElementById('thank-you-screen').classList.add('hidden');
      document.getElementById('tip-screen').classList.remove('hidden');
    }

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
      document.getElementById('installBtn').classList.remove('hidden');
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBtn').classList.add('hidden');
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
