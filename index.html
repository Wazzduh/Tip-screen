<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Tip App</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .card {
      width: min(92vw, 420px);
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }
    p {
      margin: 0 0 22px;
      color: #4b5563;
      font-size: 1rem;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      font-weight: bold;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    button:hover { opacity: 0.95; }
    button:active { transform: scale(0.98); }
    .secondary { background: #6b7280; }
    .thank-you {
      font-size: 2rem;
      font-weight: bold;
      color: #16a34a;
      margin-top: 8px;
    }
    .subtext {
      margin-top: 10px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="card" id="app">
    <h1>Leave a Tip</h1>
    <p>Choose an option below.</p>
    <div class="buttons">
      <button data-tip="$2">$2</button>
      <button data-tip="$5">$5</button>
      <button data-tip="$10">$10</button>
      <button class="secondary" data-tip="No Tip">No Tip</button>
    </div>
  </main>

  <script>
    const app = document.getElementById('app');

    app.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-tip]');
      if (!button) return;

      app.innerHTML = `
        <h1>Thank you!</h1>
        <div class="thank-you">✓</div>
        <p class="subtext">Your selection was received.</p>
      `;
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
